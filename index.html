<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الجاسوس</title>
    <style>
        /* التنسيقات العامة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes blurReveal { from { filter: blur(20px); opacity: 0; } to { filter: blur(0); opacity: 1; } }

        h1 { text-align: center; color: #667eea; margin-bottom: 30px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.5s ease-in; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; font-size: 1.1em; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px;
            font-size: 16px; transition: all 0.3s; font-family: inherit;
        }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        button.secondary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        button.success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        button.warning { background: linear-gradient(135deg, #ffa726 0%, #fb8c00 100%); }
        button.danger { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); }
        
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .mode-card {
            padding: 30px; border: 3px solid #667eea; border-radius: 15px;
            text-align: center; cursor: pointer; transition: all 0.3s; background: white;
        }
        .mode-card:hover { background: #667eea; color: white; transform: translateY(-5px); }
        .mode-card .icon { font-size: 3em; margin-bottom: 15px; }

        .player-item {
            background: #f8f9fa; padding: 12px; margin: 8px 0; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .word-display {
            text-align: center; margin: 30px 0; padding: 40px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 15px; min-height: 200px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }
        .word-hidden { filter: blur(20px); opacity: 0; }
        .word-visible { animation: blurReveal 0.5s ease-out forwards; opacity: 1; }
        .timer { text-align: center; font-size: 3em; font-weight: bold; color: #667eea; margin: 20px 0; }
        .room-code-display { text-align: center; padding: 20px; background: #e3f2fd; border-radius: 15px; margin: 20px 0; }
        .room-code-display .code { font-size: 2.5em; font-weight: bold; color: #667eea; letter-spacing: 5px; }
        
        .sound-controls { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .sound-control {
            background: white; border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-size: 1.2em;
        }
        .word-tag { display: inline-block; background: #667eea; color: white; padding: 5px 12px; margin: 5px; border-radius: 20px; }
        .remove-word { cursor: pointer; margin-left: 8px; font-weight: bold; }

        @media (max-width: 480px) {
            .mode-selector { grid-template-columns: 1fr; }
            .container { padding: 15px; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <audio id="backgroundAudioPlayer" loop src="https://res.cloudinary.com/djiukbvoa/video/upload/v1779042254/Investigation_Music_Background_Suspenseful_Tension_Criminal_Background_Music_Royalty_Free_srcmg6.mp3"></audio>

    <div class="sound-controls">
        <div class="sound-control" onclick="toggleSound()"><span id="soundIcon">🔊</span></div>
        <div class="sound-control" onclick="toggleMusic()"><span id="musicIcon">🎵</span></div>
    </div>

    <div class="container">
        <h1>🕵️ لعبة الجاسوس</h1>

        <!-- الشاشة الرئيسية -->
        <div id="modeScreen" class="screen active">
            <div class="mode-selector">
                <div class="mode-card" onclick="selectMode('offline')">
                    <div class="icon">📱</div>
                    <h3>وضع أوفلاين</h3>
                </div>
                <div class="mode-card" onclick="selectMode('online')">
                    <div class="icon">🌐</div>
                    <h3>وضع أونلاين</h3>
                </div>
            </div>
            <button onclick="showCustomWordsManager()" class="warning">📝 الكلمات المخصصة</button>
        </div>

        <!-- شاشة الكلمات المخصصة -->
        <div id="customWordsScreen" class="screen">
            <h3>📝 إدارة الكلمات</h3>
            <div class="input-group" style="margin-top:15px;">
                <input type="text" id="customWordInput" placeholder="أضف كلمة...">
                <button onclick="addCustomWord()">إضافة ➕</button>
            </div>
            <div id="customWordsDisplay" style="margin: 15px 0;"></div>
            <div class="button-group">
                <button onclick="showShareCode()" class="success">مشاركة القائمة 🔗</button>
                <button onclick="clearAllCustomWords()" class="danger">حذف الكل 🗑️</button>
            </div>
            <div id="shareCodeDisplay" style="display:none; margin-top:15px;" class="room-code-display">
                <p>كود المشاركة:</p>
                <div class="code" id="shareCodeText" style="font-size: 1em; letter-spacing: 1px; word-break: break-all;"></div>
                <button onclick="copyShareCode()">نسخ الكود 📋</button>
            </div>
            <hr style="margin: 20px 0;">
            <div class="input-group">
                <label>استيراد من كود:</label>
                <input type="text" id="importCodeInput" placeholder="الصق الكود هنا...">
                <button onclick="importWordsFromCode()" class="success">استيراد 📥</button>
            </div>
            <button onclick="backToMode()" class="secondary">رجوع</button>
        </div>

        <!-- شاشة إعداد الأوفلاين -->
        <div id="offlineSetupScreen" class="screen">
            <div class="input-group">
                <label>الفئة:</label>
                <select id="categorySelect">
                    <option value="mixed">مختلط</option>
                    <option value="places">أماكن</option>
                    <option value="jobs">مهن</option>
                    <option value="custom">كلمات مخصصة 📝</option>
                </select>
            </div>
            <div class="input-group">
                <label>عدد الجواسيس:</label>
                <input type="number" id="impostorCount" min="1" value="1">
            </div>
            <div class="input-group">
                <label>إضافة لاعب:</label>
                <input type="text" id="playerNameInput" placeholder="اسم اللاعب">
                <button onclick="addPlayer()">إضافة</button>
            </div>
            <div id="playerList"></div>
            <button onclick="startOfflineGame()" class="success">ابدأ اللعبة</button>
            <button onclick="backToMode()" class="secondary">رجوع</button>
        </div>

        <!-- شاشة عرض الكلمات (أوفلاين) -->
        <div id="wordScreen" class="screen">
            <h2 id="currentPlayerName" style="text-align:center;"></h2>
            <div id="wordDisplay"></div>
            <div id="showHideButtonContainer"></div>
            <button id="nextPlayerBtn" onclick="nextPlayer()" class="success">اللاعب التالي</button>
        </div>

        <!-- شاشة اللعب (أوفلاين) -->
        <div id="gameScreen" class="screen">
            <div id="timerDisplay" class="timer">00:00</div>
            <div id="firstPlayerAlert" class="alert info"></div>
            <button onclick="revealImpostors()" class="danger">كشف الجواسيس</button>
            <button onclick="resetGame()" class="secondary">إنهاء الجولة</button>
        </div>

        <!-- شاشة الأونلاين (الغرفة) -->
        <div id="onlineRoomScreen" class="screen">
            <input type="text" id="playerName" placeholder="اسمك">
            <div class="mode-selector">
                <button onclick="createRoom()">إنشاء غرفة</button>
                <button onclick="showJoinRoom()" class="success">الانضمام لغرفة</button>
            </div>
            <div id="joinRoomDiv" style="display:none;">
                <input type="text" id="roomCode" placeholder="كود الغرفة">
                <button onclick="joinRoom()">دخول</button>
            </div>
            <button onclick="backToMode()" class="secondary">رجوع</button>
        </div>

        <!-- شاشة اللوبي (أونلاين) -->
        <div id="lobbyScreen" class="screen">
            <div class="room-code-display">
                <p>كود الغرفة:</p>
                <div class="code" id="displayRoomCode">000000</div>
            </div>
            <div id="hostSettings" style="display:none;">
                <label>الفئة:</label>
                <select id="onlineCategorySelect">
                    <option value="mixed">مختلط</option>
                    <option value="custom">مخصصة</option>
                </select>
                <label>الجواسيس:</label>
                <input type="number" id="onlineImpostorCount" value="1" min="1">
                <button id="startOnlineGameBtn" onclick="startOnlineGame()" class="success">ابدأ اللعبة</button>
            </div>
            <div id="onlinePlayerList"></div>
            <button onclick="leaveRoom()" class="danger">مغادرة</button>
        </div>

        <!-- شاشات إضافية للأونلاين (النتائج واللعب) يتم التحكم بها عبر JS -->
        <div id="onlineGameScreen" class="screen">
            <div id="onlineTimerDisplay" class="timer"></div>
            <div id="onlineWordDisplay"></div>
            <div id="onlineShowHideButtonContainer"></div>
        </div>

        <div id="onlineResultsScreen" class="screen">
            <div id="onlineWordReveal" class="word-display"></div>
            <div id="onlineImpostorReveal"></div>
            <button onclick="backToLobby()" class="success">العودة للوبي</button>
        </div>

    </div>

    <script>
        // إعدادات الصوت
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true, musicEnabled = true;
        const bgMusic = document.getElementById('backgroundAudioPlayer');

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundIcon').textContent = soundEnabled ? '🔊' : '🔇';
        }
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            if(musicEnabled) bgMusic.play(); else bgMusic.pause();
            document.getElementById('musicIcon').textContent = musicEnabled ? '🎵' : '🎶';
        }

        function playClick() { if(soundEnabled) { /* صوت بسيط */ } }

        // إدارة الكلمات المخصصة
        let customWords = JSON.parse(localStorage.getItem('spy_custom') || '[]');
        
        function updateCustomWordsDisplay() {
            const container = document.getElementById('customWordsDisplay');
            container.innerHTML = customWords.map(w => `
                <span class="word-tag">${w}<span class="remove-word" onclick="removeCustomWord('${w}')">×</span></span>
            `).join('');
            document.getElementById('customWordsCount').textContent = customWords.length;
        }

        function addCustomWord() {
            const input = document.getElementById('customWordInput');
            const word = input.value.trim();
            if(word && !customWords.includes(word)) {
                customWords.push(word);
                localStorage.setItem('spy_custom', JSON.stringify(customWords));
                input.value = '';
                updateCustomWordsDisplay();
            }
        }

        function removeCustomWord(word) {
            customWords = customWords.filter(w => w !== word);
            localStorage.setItem('spy_custom', JSON.stringify(customWords));
            updateCustomWordsDisplay();
        }

        function clearAllCustomWords() {
            if(confirm('حذف كل الكلمات؟')) {
                customWords = [];
                localStorage.removeItem('spy_custom');
                updateCustomWordsDisplay();
            }
        }

        // ضغط وفك ضغط الكلمات للمشاركة
        function showShareCode() {
            if(customWords.length === 0) return alert('أضف كلمات أولاً');
            const code = btoa(unescape(encodeURIComponent(customWords.join('|'))));
            document.getElementById('shareCodeText').textContent = code;
            document.getElementById('shareCodeDisplay').style.display = 'block';
        }

        function copyShareCode() {
            navigator.clipboard.writeText(document.getElementById('shareCodeText').textContent);
            alert('تم النسخ!');
        }

        function importWordsFromCode() {
            try {
                const code = document.getElementById('importCodeInput').value;
                const words = decodeURIComponent(escape(atob(code))).split('|');
                customWords = [...new Set([...customWords, ...words])];
                localStorage.setItem('spy_custom', JSON.stringify(customWords));
                updateCustomWordsDisplay();
                alert('تم الاستيراد بنجاح!');
            } catch(e) { alert('كود غير صالح'); }
        }

        // قاعدة البيانات
        const wordsDB = {
            places: ["مطار", "مستشفى", "حديقة", "مدرسة", "سجن", "غابة", "مطعم"],
            jobs: ["مهندس", "طبيب", "طيار", "محامي", "طباخ", "جندي"],
            mixed: ["أسد", "هاتف", "سيارة", "موز", "نظارة", "مفتاح"]
        };

        // وظائف الملاحة الأساسية
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectMode(mode) {
            if(mode === 'offline') showScreen('offlineSetupScreen');
            else showScreen('onlineRoomScreen');
        }

        function backToMode() { showScreen('modeScreen'); }
        function showCustomWordsManager() { showScreen('customWordsScreen'); updateCustomWordsDisplay(); }

        // يتبع في الجزء الثاني...        // --- تابع الجزء الثاني من JavaScript ---

        // منطق اللاعبين (أوفلاين)
        let players = [];
        let currentWord = "", impostors = [], currentPlayerIdx = 0, isWordVisible = false;
        let offlineTimer;

        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            const name = input.value.trim();
            if (name && !players.includes(name)) {
                players.push(name);
                input.value = '';
                renderOfflinePlayers();
            }
        }

        function renderOfflinePlayers() {
            const list = document.getElementById('playerList');
            list.innerHTML = players.map((p, i) => `
                <div class="player-item">
                    <span class="name">${p}</span>
                    <button onclick="players.splice(${i},1);renderOfflinePlayers()" class="danger" style="width:auto; padding:5px 10px;">حذف</button>
                </div>
            `).join('');
        }

        function startOfflineGame() {
            if (players.length < 3) return alert("يجب إضافة 3 لاعبين على الأقل!");
            const category = document.getElementById('categorySelect').value;
            const wordList = category === 'custom' ? customWords : (wordsDB[category] || wordsDB.mixed);
            
            if (wordList.length === 0) return alert("هذه القائمة فارغة!");

            currentWord = wordList[Math.floor(Math.random() * wordList.length)];
            const shuffled = [...players].sort(() => Math.random() - 0.5);
            const impCount = document.getElementById('impostorCount').value;
            impostors = shuffled.slice(0, impCount);
            
            currentPlayerIdx = 0;
            showScreen('wordScreen');
            showCurrentPlayer();
        }

        function showCurrentPlayer() {
            isWordVisible = false;
            const player = players[currentPlayerIdx];
            document.getElementById('currentPlayerName').textContent = `دور اللاعب: ${player}`;
            const display = document.getElementById('wordDisplay');
            display.innerHTML = `
                <div class="word-display">
                    <div id="actualWord" class="word-hidden">
                        <h2>${impostors.includes(player) ? "🕵️ أنت الجاسوس!" : currentWord}</h2>
                    </div>
                    <div id="wordPlaceholder" style="font-size:3em;">🔒</div>
                </div>`;
            
            document.getElementById('showHideButtonContainer').innerHTML = `
                <button onclick="toggleWord()" class="warning">إظهار / إخفاء</button>
            `;
            document.getElementById('nextPlayerBtn').textContent = 
                (currentPlayerIdx === players.length - 1) ? "بدء النقاش" : "اللاعب التالي";
        }

        function toggleWord() {
            isWordVisible = !isWordVisible;
            document.getElementById('actualWord').className = isWordVisible ? "word-visible" : "word-hidden";
            document.getElementById('wordPlaceholder').style.display = isWordVisible ? "none" : "block";
        }

        function nextPlayer() {
            if (currentPlayerIdx < players.length - 1) {
                currentPlayerIdx++;
                showCurrentPlayer();
            } else {
                startDiscussion();
            }
        }

        function startDiscussion() {
            showScreen('gameScreen');
            const randomStarter = players[Math.floor(Math.random() * players.length)];
            document.getElementById('firstPlayerAlert').textContent = `🎯 يبدأ النقاش: ${randomStarter}`;
            
            let time = 180;
            clearInterval(offlineTimer);
            offlineTimer = setInterval(() => {
                const m = Math.floor(time / 60), s = time % 60;
                document.getElementById('timerDisplay').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (--time < 0) clearInterval(offlineTimer);
            }, 1000);
        }

        function revealImpostors() {
            alert(`الجواسيس هم: ${impostors.join(' و ')}\nالكلمة كانت: ${currentWord}`);
        }

        function resetGame() {
            clearInterval(offlineTimer);
            showScreen('offlineSetupScreen');
        }

        // --- منطق الأونلاين (Firebase) ---
        let roomCode = "", isHost = false, myName = "";
        let roomRef, playersRef, gameRef;

        function showJoinRoom() {
            document.getElementById('joinRoomDiv').style.display = 'block';
        }

        function createRoom() {
            myName = document.getElementById('playerName').value.trim();
            if (!myName) return alert("ادخل اسمك أولاً");
            
            roomCode = Math.floor(100000 + Math.random() * 900000).toString();
            isHost = true;
            
            roomRef = database.ref('rooms/' + roomCode);
            roomRef.set({
                host: myName,
                status: 'waiting',
                settings: { category: 'mixed', impostors: 1 }
            });

            joinProcess();
        }

        function joinRoom() {
            myName = document.getElementById('playerName').value.trim();
            roomCode = document.getElementById('roomCode').value.trim();
            if (!myName || !roomCode) return alert("ادخل اسمك وكود الغرفة");
            
            roomRef = database.ref('rooms/' + roomCode);
            roomRef.once('value', snapshot => {
                if (snapshot.exists()) {
                    isHost = false;
                    joinProcess();
                } else {
                    alert("الغرفة غير موجودة");
                }
            });
        }

        function joinProcess() {
            playersRef = roomRef.child('players');
            playersRef.child(myName).set({ name: myName, isHost: isHost });
            
            document.getElementById('displayRoomCode').textContent = roomCode;
            document.getElementById('hostSettings').style.display = isHost ? 'block' : 'none';
            
            showScreen('lobbyScreen');
            listenToRoom();
        }

        function listenToRoom() {
            playersRef.on('value', snapshot => {
                const list = [];
                snapshot.forEach(p => { list.push(p.val()); });
                document.getElementById('onlinePlayerList').innerHTML = list.map(p => `
                    <div class="player-item">
                        <span>${p.name} ${p.isHost ? '👑' : ''}</span>
                    </div>
                `).join('');
                
                if (isHost) {
                    document.getElementById('startOnlineGameBtn').disabled = list.length < 3;
                }
            });

            roomRef.child('status').on('value', status => {
                if (status.val() === 'playing') startOnlineGameLogic();
                if (status.val() === 'waiting' && !isHost) showScreen('lobbyScreen');
            });
        }

        function startOnlineGame() {
            const cat = document.getElementById('onlineCategorySelect').value;
            const list = cat === 'custom' ? customWords : (wordsDB[cat] || wordsDB.mixed);
            const word = list[Math.floor(Math.random() * list.length)];
            
            playersRef.once('value', snapshot => {
                const pList = Object.keys(snapshot.val());
                const imp = pList.sort(() => Math.random() - 0.5).slice(0, document.getElementById('onlineImpostorCount').value);
                
                roomRef.child('game').set({
                    word: word,
                    impostors: imp,
                    startTime: Date.now()
                });
                roomRef.update({ status: 'playing' });
            });
        }

        function startOnlineGameLogic() {
            showScreen('onlineGameScreen');
            roomRef.child('game').once('value', snapshot => {
                const data = snapshot.val();
                const isImp = data.impostors.includes(myName);
                
                document.getElementById('onlineWordDisplay').innerHTML = `
                    <div class="word-display">
                        <div id="onlineActualWord" class="word-hidden">
                            <h2>${isImp ? "🕵️ أنت الجاسوس!" : data.word}</h2>
                        </div>
                        <div id="onlinePlaceholder" style="font-size:3em;">🔒</div>
                        <button onclick="document.getElementById('onlineActualWord').className='word-visible'; this.style.display='none'; document.getElementById('onlinePlaceholder').style.display='none';" class="warning" style="margin-top:20px;">إظهار الكلمة</button>
                    </div>`;
            });
        }

        function leaveRoom() {
            if (playersRef) playersRef.child(myName).remove();
            showScreen('modeScreen');
        }

        function backToLobby() {
            if (isHost) roomRef.update({ status: 'waiting' });
        }

        // إغلاق التاجات
    </script>
</body>
</html>
