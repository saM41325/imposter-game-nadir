<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spy Game Ultimate</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
    font-family:Segoe UI;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:20px;
}
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#667eea;
    color:white;
}
.player-item{
    background:#f1f1f1;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}
.timer{
    font-size:2em;
    margin:15px;
}
.hidden{display:none;}
</style>
</head>
<body>

<div class="container">

<h1>🕵️ Spy Game</h1>

<div id="setup">
<input id="name" placeholder="اسمك">
<button onclick="createRoom()">إنشاء غرفة</button>
<input id="roomCode" placeholder="كود">
<button onclick="joinRoom()">انضم</button>
<div id="error"></div>
</div>

<div id="lobby" class="hidden">
<h2>كود الغرفة: <span id="roomDisplay"></span></h2>

<button id="lockBtn" onclick="toggleLock()">🔒 إغلاق الغرفة</button>

<h3>اللاعبون</h3>
<div id="players"></div>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>

عدد الجواسيس:
<input type="number" id="impostorCount" value="1" min="1">

<br>
<button onclick="startGame()">ابدأ</button>
</div>

<div id="game" class="hidden">
<div class="timer" id="timer"></div>
<h2 id="word"></h2>
<button onclick="readyVote()">🗳️ الانتقال للتصويت</button>
</div>

<div id="voting" class="hidden">
<h2>صوّت</h2>
<div id="voteButtons"></div>
</div>

<div id="results" class="hidden">
<h2>النتائج</h2>
<div id="resultContent"></div>
<button onclick="backLobby()">عودة</button>
</div>

</div>

<!-- Sounds -->
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=mouse-click-153941.mp3"></audio>
<audio id="menuSound" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_5f9c6f3c9e.mp3?filename=interface-click-124467.mp3"></audio>
<audio id="winSound" src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_946f96db0a.mp3?filename=success-fanfare-trumpets-6185.mp3"></audio>
<audio id="bgMusic" loop src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=relaxing-145038.mp3"></audio>

<script>

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB",
projectId:"YOUR_ID",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"YOUR_MSG",
appId:"YOUR_APP"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let roomCode=null;
let name=null;
let isHost=false;

function play(id,v=0.3){
let s=document.getElementById(id);
s.volume=v;
s.currentTime=0;
s.play();
}

document.addEventListener("click",e=>{
if(e.target.tagName==="BUTTON")play("clickSound",0.2);
});

function createRoom(){
name=document.getElementById("name").value;
if(!name)return;
roomCode=Math.floor(100000+Math.random()*900000);
isHost=true;

db.ref("rooms/"+roomCode).set({
locked:false,
scores:{[name]:0},
players:{[name]:true}
});

enterLobby();
}

function joinRoom(){
name=document.getElementById("name").value;
roomCode=document.getElementById("roomCode").value;
if(!name||!roomCode)return;

db.ref("rooms/"+roomCode).once("value").then(snap=>{
if(!snap.exists())return alert("لا يوجد");
let data=snap.val();
if(data.locked)return alert("الغرفة مغلقة");
if(data.banned&&data.banned[name])return alert("محظور");

db.ref("rooms/"+roomCode+"/players/"+name).set(true);
db.ref("rooms/"+roomCode+"/scores/"+name).once("value")
.then(s=>{if(!s.exists())db.ref("rooms/"+roomCode+"/scores/"+name).set(0);});

enterLobby();
});
}

function enterLobby(){
document.getElementById("setup").classList.add("hidden");
document.getElementById("lobby").classList.remove("hidden");
document.getElementById("roomDisplay").textContent=roomCode;
document.getElementById("bgMusic").volume=0.15;
document.getElementById("bgMusic").play();

listenLobby();
}

function listenLobby(){
db.ref("rooms/"+roomCode+"/players").on("value",snap=>{
let players=snap.val()||{};
let html="";
Object.keys(players).forEach(p=>{
html+=`<div class="player-item">${p}
${isHost&&p!==name?
`<span>
<button onclick="kick('${p}')">Kick</button>
<button onclick="ban('${p}')">Ban</button>
</span>`:""}
</div>`;
});
document.getElementById("players").innerHTML=html;

let count=Object.keys(players).length;
document.getElementById("impostorCount").max=Math.max(1,count-2);
});
updateLeaderboard();
}

function updateLeaderboard(){
db.ref("rooms/"+roomCode+"/scores").on("value",snap=>{
let scores=snap.val()||{};
let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
let html="";
sorted.forEach((s,i)=>{
html+=`<div>#${i+1} ${s[0]} ⭐ ${s[1]}</div>`;
});
document.getElementById("leaderboard").innerHTML=html;
});
}

function kick(p){
db.ref("rooms/"+roomCode+"/players/"+p).remove();
}

function ban(p){
db.ref("rooms/"+roomCode+"/banned/"+p).set(true);
kick(p);
}

function toggleLock(){
db.ref("rooms/"+roomCode+"/locked").once("value")
.then(s=>{
let locked=s.val();
db.ref("rooms/"+roomCode+"/locked").set(!locked);
document.getElementById("lockBtn").textContent=
locked?"🔒 إغلاق الغرفة":"🔓 فتح الغرفة";
});
}

function startGame(){
let count=parseInt(document.getElementById("impostorCount").value);
db.ref("rooms/"+roomCode+"/players").once("value").then(snap=>{
let players=Object.keys(snap.val());
if(count>=players.length-1)return alert("عدد غير صحيح");

let word="مدرسة";
let shuffled=[...players].sort(()=>Math.random()-0.5);
let impostors=shuffled.slice(0,count);

db.ref("rooms/"+roomCode+"/game").set({
word,
impostors,
ready:{},
votes:{},
state:"word"
});
});
}

db.ref("rooms/"+roomCode+"/game").on("value",snap=>{
if(!snap.exists())return;
let data=snap.val();

if(data.state==="word"){
document.getElementById("lobby").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
document.getElementById("word").textContent=
data.impostors.includes(name)?"🕵️ أنت الجاسوس":data.word;
startTimer(60);
}

if(data.state==="vote"){
showVoting();
}

if(data.state==="results"){
showResults(data);
}
});

function startTimer(t){
let timer=document.getElementById("timer");
let int=setInterval(()=>{
timer.textContent=t;
if(t<=5)play("menuSound",0.2);
if(t===0){clearInterval(int);readyVote();}
t--;
},1000);
}

function readyVote(){
db.ref("rooms/"+roomCode+"/game/ready/"+name).set(true);
db.ref("rooms/"+roomCode+"/game/ready").once("value")
.then(s=>{
db.ref("rooms/"+roomCode+"/players").once("value")
.then(ps=>{
if(Object.keys(s.val()).length===Object.keys(ps.val()).length){
db.ref("rooms/"+roomCode+"/game/state").set("vote");
}
});
});
}

function showVoting(){
document.getElementById("game").classList.add("hidden");
document.getElementById("voting").classList.remove("hidden");

db.ref("rooms/"+roomCode+"/players").once("value")
.then(s=>{
let players=Object.keys(s.val());
let html="";
players.forEach(p=>{
html+=`<button onclick="vote('${p}')">${p}</button>`;
});
document.getElementById("voteButtons").innerHTML=html;
});
}

function vote(p){
db.ref("rooms/"+roomCode+"/game/votes/"+name).set(p);
db.ref("rooms/"+roomCode+"/game/votes").once("value")
.then(s=>{
db.ref("rooms/"+roomCode+"/players").once("value")
.then(ps=>{
if(Object.keys(s.val()).length===Object.keys(ps.val()).length){
db.ref("rooms/"+roomCode+"/game/state").set("results");
}
});
});
}

function showResults(data){
play("menuSound",0.5);
document.getElementById("voting").classList.add("hidden");
document.getElementById("results").classList.remove("hidden");

let votes=data.votes||{};
let counts={};
Object.values(votes).forEach(v=>counts[v]=(counts[v]||0)+1);
let sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
let eliminated=sorted[0]?sorted[0][0]:null;

let caught=data.impostors.includes(eliminated);

let html=`<p>الكلمة: ${data.word}</p>`;
html+=`<p>المُقصى: ${eliminated||"لا أحد"}</p>`;

if(caught){html+="✅ تم كشف الجاسوس";}else{html+="❌ لم يتم كشفه";}

document.getElementById("resultContent").innerHTML=html;

updatePoints(data,caught);

play("winSound",0.6);
}

function updatePoints(data,caught){
db.ref("rooms/"+roomCode+"/scores").once("value")
.then(s=>{
let scores=s.val();
Object.keys(scores).forEach(p=>{
let pts=0;
if(data.impostors.includes(p)){
if(!caught)pts+=20;
}else{
if(caught)pts+=10;
}
db.ref("rooms/"+roomCode+"/scores/"+p).set(scores[p]+pts);
});
});
}

function backLobby(){
location.reload();
}

</script>
</body>
</html>
