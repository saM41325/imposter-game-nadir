<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الجاسوس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes blurReveal {
            from {
                filter: blur(20px);
                opacity: 0;
            }
            to {
                filter: blur(0);
                opacity: 1;
            }
        }

        @keyframes blurHide {
            from {
                filter: blur(0);
                opacity: 1;
            }
            to {
                filter: blur(20px);
                opacity: 0;
            }
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        button.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        button.warning {
            background: linear-gradient(135deg, #ffa726 0%, #fb8c00 100%);
        }

        button.show-hide-btn {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            margin-top: 20px;
            font-size: 1.3em;
            padding: 20px;
        }

        .player-list {
            margin: 20px 0;
        }

        .player-item {
            background: #f8f9fa;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        .player-item .name {
            font-weight: bold;
            color: #333;
        }

        .player-item button {
            width: auto;
            padding: 8px 15px;
            margin: 0;
            font-size: 0.9em;
        }

        .word-display {
            text-align: center;
            margin: 30px 0;
            padding: 40px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 15px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.3s ease;
        }

        .word-display h2 {
            font-size: 2.5em;
            color: #333;
            margin: 0;
        }

        .word-display .hint {
            font-size: 1.2em;
            color: #666;
            margin-top: 15px;
        }

        .word-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            padding: 20px;
        }

        .word-hidden {
            filter: blur(20px);
            user-select: none;
            pointer-events: none;
            opacity: 0;
        }

        .word-visible {
            animation: blurReveal 0.5s ease-out forwards;
            opacity: 1;
        }

        .hidden-placeholder {
            font-size: 3em;
            color: #999;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .impostor-display {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .impostor-display h2 {
            color: white;
        }

        .impostor-display .hint {
            color: #ffe0e0;
        }

        .impostor-display-no-hint {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .impostor-display-no-hint h2 {
            color: white;
        }

        .impostor-display-no-hint p {
            color: white;
        }

        .impostor-revealed {
            animation: pulse 2s infinite;
        }

        .timer {
            text-align: center;
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .timer.warning {
            color: #f5576c;
            animation: pulse 1s infinite;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .category-btn {
            padding: 15px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .category-btn:hover {
            background: #667eea;
            color: white;
        }

        .category-btn.selected {
            background: #667eea;
            color: white;
        }

        .voting-section {
            margin: 20px 0;
        }

        .vote-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        .vote-btn {
            padding: 15px 10px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 0.9em;
        }

        .vote-btn:hover {
            background: #667eea;
            color: white;
        }

        .vote-btn.voted {
            background: #4facfe;
            border-color: #4facfe;
            color: white;
        }

        .vote-results {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .vote-result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
        }

        .alert {
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        .alert.error {
            background: #ffe0e0;
            color: #d32f2f;
            animation: shake 0.5s;
        }

        .alert.success {
            background: #e0ffe0;
            color: #2f7d32;
        }

        .alert.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .player-name-display {
            text-align: center;
            font-size: 1.8em;
            color: #667eea;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-weight: bold;
        }

        .first-player-badge {
            display: inline-block;
            background: #ffd700;
            color: #333;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-right: 10px;
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .word-display {
                height: 200px;
            }

            .word-display h2 {
                font-size: 1.8em;
            }

            .timer {
                font-size: 2em;
            }

            .category-grid {
                grid-template-columns: 1fr;
            }
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .setting-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .setting-item label {
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .setting-item input {
            margin-top: 5px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            transform: scale(1.5);
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            user-select: none;
        }

        .settings-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .settings-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .custom-words-section {
            background: #fff3e0;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #ffa726;
        }

        .custom-words-section h3 {
            color: #fb8c00;
            margin-bottom: 15px;
            text-align: center;
        }

        .word-item {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
            animation: slideIn 0.3s ease-out;
        }

        .word-item .word-content {
            flex: 1;
            position: static;
            transform: none;
            width: auto;
            padding: 0;
        }

        .word-item .word-text {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }

        .word-item .hint-text {
            color: #666;
            font-size: 0.9em;
            margin-top: 4px;
        }

        .word-item button {
            width: auto;
            padding: 8px 15px;
            margin: 0;
            font-size: 0.9em;
        }

        .custom-word-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 15px;
        }

        .custom-word-input-group input {
            margin: 0;
        }

        .custom-word-input-group button {
            margin: 0;
            white-space: nowrap;
        }

        .word-count {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
            padding: 8px;
            background: white;
            border-radius: 8px;
        }

        .help-text {
            font-size: 0.9em;
            color: #666;
            margin-top: 8px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            line-height: 1.6;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .eye-icon {
            font-size: 1.5em;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕵️ لعبة الجاسوس 🕵️</h1>

        <!-- Setup Screen -->
        <div id="setupScreen" class="screen active">
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('settings')">⚙️ الإعدادات</div>
                <div class="tab" onclick="switchTab('custom')">✏️ كلمات مخصصة</div>
            </div>

            <!-- Settings Tab -->
            <div id="settingsTab" class="tab-content active">
                <div class="input-group">
                    <label>اختر الفئة:</label>
                    <select id="categorySelect">
                        <option value="custom">كلمات مخصصة</option>
                        <option value="mixed">مختلط (جميع الفئات)</option>
                        <option value="places">أماكن</option>
                        <option value="jobs">مهن</option>
                        <option value="items">أشياء</option>
                        <option value="animals">حيوانات</option>
                        <option value="food">طعام</option>
                        <option value="countries">دول</option>
                        <option value="actions">أفعال</option>
                        <option value="insects">حشرات</option>
                        <option value="clothes">ملابس</option>
                        <option value="furniture">أثاث</option>
                    </select>
                </div>

                <div class="settings-section">
                    <h3>⚙️ إعدادات اللعبة</h3>
                    
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label>عدد الجواسيس:</label>
                            <input type="number" id="impostorCount" min="1" value="1">
                        </div>
                        <div class="setting-item">
                            <label>المؤقت (ثانية):</label>
                            <input type="number" id="timerDuration" min="0" value="180">
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="votingEnabled">
                        <label for="votingEnabled">تفعيل نظام التصويت</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="clueEnabled" checked>
                        <label for="clueEnabled">إعطاء تلميح للجاسوس</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>أضف لاعب:</label>
                    <input type="text" id="playerNameInput" placeholder="اسم اللاعب">
                    <button onclick="addPlayer()">إضافة لاعب</button>
                </div>

                <div id="errorMessage"></div>

                <div class="player-list" id="playerList"></div>

                <button onclick="startGame()" class="success">ابدأ اللعبة</button>
            </div>

            <!-- Custom Words Tab -->
            <div id="customTab" class="tab-content">
                <div class="custom-words-section">
                    <h3>✏️ أضف كلماتك الخاصة</h3>
                    
                    <div class="help-text">
                        💡 <strong>كيفية الإضافة:</strong><br>
                        • أدخل الكلمة في الحقل الأول<br>
                        • أدخل التلميح في الحقل الثاني (اختياري)<br>
                        • إذا لم تدخل تلميح، سيتم إنشاؤه تلقائياً<br>
                        • اضغط "إضافة كلمة" لحفظ الكلمة
                    </div>

                    <div class="custom-word-input-group">
                        <input type="text" id="customWordInput" placeholder="الكلمة">
                        <input type="text" id="customHintInput" placeholder="التلميح (اختياري)">
                        <button onclick="addCustomWord()" class="warning">إضافة كلمة</button>
                    </div>

                    <div id="customWordError"></div>

                    <div class="word-count" id="customWordCount">عدد الكلمات: 0</div>

                    <div class="player-list" id="customWordsList"></div>

                    <button onclick="clearCustomWords()" class="secondary">حذف جميع الكلمات</button>
                </div>
            </div>
        </div>

        <!-- Show Word Screen -->
        <div id="wordScreen" class="screen">
            <div class="player-name-display" id="currentPlayerName"></div>
            
            <div id="wordDisplay"></div>

            <div id="showHideButtonContainer"></div>

            <button onclick="nextPlayer()" class="success">اللاعب التالي</button>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="screen">
            <div id="timerDisplay" class="timer"></div>

            <div class="alert success" id="firstPlayerAlert" style="display: none;"></div>

            <div id="votingSection" class="voting-section" style="display: none;">
                <h3 style="text-align: center; margin-bottom: 15px;">صوت على الجاسوس</h3>
                <div class="vote-buttons" id="voteButtons"></div>
                <button onclick="showVoteResults()" class="secondary" style="margin-top: 15px;">عرض النتائج</button>
            </div>

            <div id="voteResults" class="vote-results" style="display: none;"></div>

            <button onclick="revealImpostors()">كشف الجواسيس</button>
            <button onclick="resetGame()" class="secondary">جولة جديدة</button>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen">
            <div id="impostorReveal"></div>
            <button onclick="resetGame()" class="success">لعب مرة أخرى</button>
        </div>
    </div>

        function switchTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Update tab content
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            if (tab === 'settings') {
                document.getElementById('settingsTab').classList.add('active');
            } else if (tab === 'custom') {
                document.getElementById('customTab').classList.add('active');
            }
        }

        function addCustomWord() {
            const wordInput = document.getElementById('customWordInput');
            const hintInput = document.getElementById('customHintInput');
            const word = wordInput.value.trim();
            let hint = hintInput.value.trim();
            const errorDiv = document.getElementById('customWordError');

            if (!word) {
                showCustomWordError('الرجاء إدخال الكلمة');
                return;
            }

            // Check for duplicates
            if (customWords.some(w => w.word === word)) {
                showCustomWordError('هذه الكلمة موجودة بالفعل');
                return;
            }

            // Generate hint if not provided
            if (!hint) {
                hint = getHint(word);
            }

            customWords.push({ word, hint });
            wordInput.value = '';
            hintInput.value = '';
            errorDiv.innerHTML = '';
            
            saveCustomWords();
            updateCustomWordsList();
            showCustomWordSuccess('تم إضافة الكلمة بنجاح');
        }

        function showCustomWordError(message) {
            const errorDiv = document.getElementById('customWordError');
            errorDiv.innerHTML = `<div class="alert error">${message}</div>`;
            setTimeout(() => {
                errorDiv.innerHTML = '';
            }, 3000);
        }

        function showCustomWordSuccess(message) {
            const errorDiv = document.getElementById('customWordError');
            errorDiv.innerHTML = `<div class="alert success">${message}</div>`;
            setTimeout(() => {
                errorDiv.innerHTML = '';
            }, 2000);
        }

        function updateCustomWordsList() {
            const list = document.getElementById('customWordsList');
            const count = document.getElementById('customWordCount');
            
            list.innerHTML = '';
            count.textContent = `عدد الكلمات: ${customWords.length}`;

            customWords.forEach((item, index) => {
                const wordItem = document.createElement('div');
                wordItem.className = 'word-item';
                wordItem.innerHTML = `
                    <div class="word-content">
                        <div class="word-text">${item.word}</div>
                        <div class="hint-text">تلميح: ${item.hint}</div>
                    </div>
                    <button onclick="removeCustomWord(${index})">حذف</button>
                `;
                list.appendChild(wordItem);
            });
        }

        function removeCustomWord(index) {
            customWords.splice(index, 1);
            saveCustomWords();
            updateCustomWordsList();
        }

        function clearCustomWords() {
            if (customWords.length === 0) {
                showCustomWordError('لا توجد كلمات لحذفها');
                return;
            }

            if (confirm('هل أنت متأكد من حذف جميع الكلمات؟')) {
                customWords = [];
                saveCustomWords();
                updateCustomWordsList();
                showCustomWordSuccess('تم حذف جميع الكلمات');
            }
        }

        function saveCustomWords() {
            localStorage.setItem('spyGameCustomWords', JSON.stringify(customWords));

        function loadCustomWords() {
            const saved = localStorage.getItem('spyGameCustomWords');
            if (saved) {
                customWords = JSON.parse(saved);
                updateCustomWordsList();

        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            const name = input.value.trim();
            const errorDiv = document.getElementById('errorMessage');

            if (!name) {
                showError('الرجاء إدخال اسم اللاعب');
                return;
            }

            if (players.includes(name)) {
                showError('هذا الاسم موجود بالفعل');
                return;
            }

            players.push(name);
            input.value = '';
            errorDiv.innerHTML = '';
            updatePlayerList();
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = `<div class="alert error">${message}</div>`;
            setTimeout(() => {
                errorDiv.innerHTML = '';
            }, 3000);
        }

        function updatePlayerList() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            players.forEach((player, index) => {
                const item = document.createElement('div');
                item.className = 'player-item';
                item.innerHTML = `
                    <span class="name">${player}</span>
                    <button onclick="removePlayer(${index})">حذف</button>
                `;
                list.appendChild(item);
            });
        }

        function removePlayer(index) {
            players.splice(index, 1);
            updatePlayerList();
        }

        function startGame() {

                showError('يجب إضافة 3 لاعبين على الأقل');
                return;
            }

            const impostorCount = parseInt(document.getElementById('impostorCount').value);
            if (impostorCount >= players.length) {
                showError('عدد الجواسيس يجب أن يكون أقل من عدد اللاعبين');
                return;

            // Check if clue is enabled

            // Select random word

                currentHint = getHint(currentWord);
            }

            const shuffledPlayers = [...players].sort(() => Math.random() - 0.5);
            impostors = shuffledPlayers.slice(0, impostorCount);

            // Reset and start
            currentPlayerIndex = 0;
            votes = {};
            wordVisible = false;
            
            // Select random first player
            firstPlayer = players[Math.floor(Math.random() * players.length)];

            showScreen('wordScreen');
            showPlayerWord();
        }

        function getHint(word) {
            // Generate a simple hint (first and last letter)
            if (word.length <= 2) return word[0] + "*";
            return word[0] + "*".repeat(word.length - 2) + word[word.length - 1];
        }

        function toggleWordVisibility() {
            wordVisible = !wordVisible;
            const wordElement = document.getElementById('actualWord');
            const cardElement = document.getElementById('wordCard');
            const placeholderElement = document.getElementById('placeholder');
            const button = document.getElementById('toggleWordBtn');
            const player = players[currentPlayerIndex];
            const isImpostor = impostors.includes(player);
            
            if (wordVisible) {
                wordElement.classList.remove('word-hidden');
                wordElement.classList.add('word-visible');
                placeholderElement.style.display = 'none';
                button.innerHTML = '<span class="eye-icon">👁️</span> إخفاء';
                
                // Change card color if impostor
                if (isImpostor) {
                    if (clueEnabled) {
                        cardElement.className = 'word-display impostor-display impostor-revealed';
                    } else {
                        cardElement.className = 'word-display impostor-display-no-hint impostor-revealed';
                    }
                }
            } else {
                wordElement.classList.remove('word-visible');
                wordElement.classList.add('word-hidden');
                placeholderElement.style.display = 'block';
                button.innerHTML = '<span class="eye-icon">👁️</span> إظهار الدور';
                
                // Reset to default color
                cardElement.className = 'word-display';
            }
        }

        function showPlayerWord() {
            const player = players[currentPlayerIndex];
            const isImpostor = impostors.includes(player);
            
            // Reset word visibility for each player
            wordVisible = false;
            
            document.getElementById('currentPlayerName').textContent = `🎮 ${player}`;
            
            const wordDisplay = document.getElementById('wordDisplay');
            const buttonContainer = document.getElementById('showHideButtonContainer');
            
            if (isImpostor) {
                // Impostor - show hidden card with reveal button
                if (clueEnabled) {
                    wordDisplay.innerHTML = `
                        <div id="wordCard" class="word-display">
                            <div id="actualWord" class="word-content word-hidden">
                                <h2>🕵️ أنت الجاسوس!</h2>
                                <div class="hint">تلميح: ${currentHint}</div>
                            </div>
                            <div id="placeholder" class="hidden-placeholder">🔒</div>
                        </div>
                    `;
                } else {
                    wordDisplay.innerHTML = `
                        <div id="wordCard" class="word-display">
                            <div id="actualWord" class="word-content word-hidden">
                                <h2>🕵️ أنت الجاسوس!</h2>
                                <p style="margin-top: 15px; font-size: 1.1em;">لا يوجد تلميح</p>
                            </div>
                            <div id="placeholder" class="hidden-placeholder">🔒</div>
                        </div>
                    `;
                }
            } else {
                // Normal player - show hidden word with reveal button
                wordDisplay.innerHTML = `
                    <div id="wordCard" class="word-display">
                        <div id="actualWord" class="word-content word-hidden">
                            <h2>${currentWord}</h2>
                        </div>
                        <div id="placeholder" class="hidden-placeholder">🔒</div>
                    </div>
                `;
            }
            
            // Show reveal button for all players
            buttonContainer.innerHTML = `
                <button id="toggleWordBtn" class="show-hide-btn" onclick="toggleWordVisibility()">
                    <span class="eye-icon">👁️</span> إظهار الدور
                </button>
            `;
        }

        function nextPlayer() {
            currentPlayerIndex++;
            if (currentPlayerIndex >= players.length) {
                startGamePhase();
            } else {
                showPlayerWord();
            }
        }

        function startGamePhase() {
            showScreen('gameScreen');
            
            // Show first player alert
            const alert = document.getElementById('firstPlayerAlert');
            alert.innerHTML = `<span class="first-player-badge">🎯 يبدأ</span> ${firstPlayer}`;
            alert.style.display = 'block';

            // Start timer
            const duration = parseInt(document.getElementById('timerDuration').value);
            if (duration > 0) {
                startTimer(duration);
            }

            // Setup voting if enabled
            if (document.getElementById('votingEnabled').checked) {
                document.getElementById('votingSection').style.display = 'block';
                setupVoting();
            }
        }

        function startTimer(duration) {
            let timeLeft = duration;
            const timerDisplay = document.getElementById('timerDisplay');

            function updateTimer() {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 30) {
                    timerDisplay.classList.add('warning');
                } else {
                    timerDisplay.classList.remove('warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = 'انتهى الوقت!';
                } else {
                    timeLeft--;
                }
            }

            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function setupVoting() {
            const voteButtons = document.getElementById('voteButtons');
            voteButtons.innerHTML = '';
            
            players.forEach(player => {
                votes[player] = 0;
                const btn = document.createElement('button');
                btn.className = 'vote-btn';
                btn.textContent = player;
                btn.onclick = () => vote(player, btn);
                voteButtons.appendChild(btn);
            });
        }

        function vote(player, btn) {
            votes[player]++;
            btn.classList.add('voted');
            btn.textContent = `${player} (${votes[player]})`;
        }

        function showVoteResults() {
            const resultsDiv = document.getElementById('voteResults');
            const sortedVotes = Object.entries(votes).sort((a, b) => b[1] - a[1]);
            
            let html = '<h3 style="text-align: center; margin-bottom: 15px;">نتائج التصويت</h3>';
            sortedVotes.forEach(([player, count]) => {
                const isImpostor = impostors.includes(player);
                html += `
                    <div class="vote-result-item">
                        <span>${player} ${isImpostor ? '🕵️' : ''}</span>
                        <span>${count} ${count === 1 ? 'صوت' : 'أصوات'}</span>
                    </div>
                `;
            });
            
            resultsDiv.innerHTML = html;
            resultsDiv.style.display = 'block';
        }

        function revealImpostors() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }

            const revealDiv = document.getElementById('impostorReveal');
            let html = '<h2 style="text-align: center; color: #667eea; margin-bottom: 30px;">🎯 النتائج</h2>';
            html += `<div class="word-display"><h2>الكلمة كانت: ${currentWord}</h2></div>`;
            
            html += '<h3 style="margin: 30px 0 15px; text-align: center;">الجواسيس:</h3>';
            impostors.forEach(impostor => {
                html += `<div class="word-display impostor-display"><h2>🕵️ ${impostor}</h2></div>`;
            });

            html += '<h3 style="margin: 30px 0 15px; text-align: center;">اللاعبون العاديون:</h3>';
            const normalPlayers = players.filter(p => !impostors.includes(p));
            normalPlayers.forEach(player => {
                html += `<div class="word-display"><h2>✅ ${player}</h2></div>`;
            });

            revealDiv.innerHTML = html;
            showScreen('resultsScreen');
        }

        function resetGame() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            impostors = [];
            currentWord = "";
            currentHint = "";
            currentPlayerIndex = 0;
            votes = {};
            firstPlayer = "";
            wordVisible = false;
            document.getElementById('voteResults').style.display = 'none';
            showScreen('setupScreen');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // Allow Enter key to add player
        document.getElementById('playerNameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addPlayer();
            }
        });

        // Allow Enter key to add custom word
        document.getElementById('customWordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addCustomWord();
            }
        });

        document.getElementById('customHintInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addCustomWord();
            }
        });
    </script>
</body>
</html>
